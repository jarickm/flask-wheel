<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coolaire Raffle | Participant Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0056b3; color: white; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); }
        input::placeholder { color: rgba(0,0,0,0.3); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md animate-in slide-in-from-bottom duration-700">

        <div class="text-center mb-8">
            <img src="/static/logo.png" alt="Coolaire" class="h-14 mx-auto mb-4 drop-shadow-md">
            <h1 class="text-3xl font-black tracking-tighter uppercase">Raffle Entry</h1>
        </div>

        <div class="glass p-8 shadow-2xl">
            <p class="text-center text-sm font-medium opacity-80 mb-8">Please enter your details to participate in the upcoming lucky draw.</p>

            {% if message %}
            <div class="bg-red-500/30 border border-red-500 p-4 rounded-2xl mb-6 text-xs font-bold text-center uppercase tracking-widest">
                {{ message }}
            </div>
            {% endif %}

            <!-- Inside the form in register.html -->
<form action="/register" method="POST" class="space-y-4">
    <div>
        <label class="text-[10px] font-black uppercase tracking-widest opacity-60 ml-1">Full Name</label>
        <input type="text" name="name" required class="w-full p-4 rounded-2xl bg-white text-slate-900 font-bold outline-none mt-1 shadow-inner">
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="text-[10px] font-black uppercase tracking-widest opacity-60 ml-1">Company</label>
            <input type="text" name="company" required class="w-full p-4 rounded-2xl bg-white text-slate-900 font-bold outline-none mt-1 shadow-inner">
        </div>
        <div>
            <label class="text-[10px] font-black uppercase tracking-widest opacity-60 ml-1">Mobile No.</label>
            <input type="text" name="phone" required placeholder="0917..." class="w-full p-4 rounded-2xl bg-white text-slate-900 font-bold outline-none mt-1 shadow-inner">
        </div>
    </div>

    <div>
        <label class="text-[10px] font-black uppercase tracking-widest opacity-60 ml-1">Dept / Position</label>
        <input type="text" name="details" placeholder="Engineering Manager" class="w-full p-4 rounded-2xl bg-white text-slate-900 font-bold outline-none mt-1 shadow-inner">
    </div>

    <div class="pt-4">
        <button type="submit" class="w-full py-5 bg-white text-[#0056b3] rounded-2xl font-black text-lg uppercase shadow-xl transition-all active:scale-95">
            Register Entry
        </button>
    </div>
</form>
        </div>

        <div class="mt-8 text-center">
            <p class="text-[10px] font-bold uppercase tracking-widest opacity-40">Coolaire Consolidated Inc.</p>
        </div>
    </div>
</body>
</html>
