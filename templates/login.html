<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CCI Workspace | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .cci-card { background: white; border: 1px solid #e2e8f0; box-shadow: 0 20px 40px rgba(0,86,179,0.05); }
        .brand-gradient { background: linear-gradient(135deg, #0056b3 0%, #00a8e8 100%); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-[420px] animate-in fade-in duration-700">

        <!-- Workspace Header -->
        <div class="text-center mb-10">
            <img src="/static/logo.png" class="h-14 mx-auto mb-4 drop-shadow-sm">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.4em]">Raffle Control Center</p>
        </div>

        <div class="cci-card rounded-[40px] p-10 relative overflow-hidden">
            <!-- Top Branding Accent -->
            <div class="absolute top-0 left-0 w-full h-2 brand-gradient"></div>

            <h1 class="text-3xl font-black text-slate-900 tracking-tighter mb-1">Admin Portal</h1>
            <p class="text-slate-500 text-sm mb-8 font-medium">Authorized personnel only.</p>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="mb-6 p-4 bg-red-50 text-red-600 text-xs font-bold rounded-2xl border-l-4 border-red-500">
                    {{ messages[0] }}
                </div>
              {% endif %}
            {% endwith %}

            <!-- Admin Login Form -->
            <form action="/login" method="POST" class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Username</label>
                    <input type="text" name="username" required class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold focus:border-[#0056b3] outline-none transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Password</label>
                    <input type="password" name="password" required class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold focus:border-[#0056b3] outline-none transition-all">
                </div>
                <button type="submit" class="w-full py-5 bg-[#0056b3] text-white rounded-2xl font-black text-lg uppercase shadow-xl hover:bg-[#003d7a] transition-all">
                    Access Dashboard
                </button>
            </form>

            <!-- PUBLIC REGISTRATION SECTION -->
            <div class="mt-10 pt-8 border-t border-slate-100 text-center">
                <p class="text-[11px] text-slate-500 font-bold uppercase tracking-widest mb-4">Are you a participant?</p>
                <a href="/register" class="inline-block w-full py-4 border-2 border-[#0056b3] text-[#0056b3] rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-[#0056b3] hover:text-white transition-all">
                    Register for the Raffle
                </a>
            </div>
        </div>

        <p class="text-center mt-8 text-slate-400 text-[10px] font-bold uppercase tracking-widest">
            &copy; Coolaire Consolidated Inc.
        </p>
    </div>

    <script>
        // SECRET KEYBOARD CODE: 7799
        let buffer = "";
        window.addEventListener("keyup", (e) => {
            buffer += e.key;
            if (buffer.endsWith("7799")) {
                window.location.href = "/register_admin";
            }
            if (buffer.length > 10) buffer = buffer.substring(buffer.length - 10);
        });
    </script>
</body>
</html>
