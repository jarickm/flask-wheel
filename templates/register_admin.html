<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CCI Setup | Create Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-[420px] bg-white rounded-[40px] p-10 border border-slate-200 shadow-xl">
        <img src="/static/logo.png" class="h-10 mx-auto mb-8">
        <h1 class="text-3xl font-black text-slate-900 tracking-tighter mb-2">Create Admin</h1>
        <p class="text-slate-500 text-sm mb-8">Set up your workspace administrator account.</p>

        {% if message %}<div class="mb-6 p-4 bg-red-50 text-red-600 text-xs font-bold rounded-2xl">{{ message }}</div>{% endif %}

        <form action="/register_admin" method="POST" class="space-y-6">
            <input type="text" name="username" placeholder="Choose Username" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none" required>
            <input type="password" name="password" placeholder="Choose Password" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none" required>
            <button type="submit" class="w-full py-5 bg-black text-white rounded-2xl font-black text-lg uppercase shadow-xl transition-all">Create Account</button>
        </form>
    </div>
</body>
</html>
